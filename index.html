<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">Expense Tracker</h2>

            <div class="row g-3">
                <div class="col-md-4">
                    <input type="number" id="amount" class="form-control" placeholder="Enter amount">
                </div>

                <div class="col-md-4">
                    <input type="text" id="description" class="form-control" placeholder="Enter description">
                </div>

                <div class="col-md-4">
                    <select id="category" class="form-select">
                        <option value="">Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div id="errorMsg" class="alert alert-danger mt-3 d-none">
                Please fill in all fields.
            </div>

            <div class="text-center mt-4">
                <button id="addBtn" class="btn btn-primary" onclick="addExpense()">Add Expense</button>
                <button id="updateBtn" class="btn btn-success d-none" onclick="updateExpense()">Update Expense</button>
                <button id="cancelBtn" class="btn btn-secondary d-none" onclick="cancelEdit()">Cancel</button>
            </div>

            <hr>

            <h4>Expense List</h4>

            <div id="emptyMsg" class="text-center text-muted py-3 d-none">
                No expenses added yet.
            </div>

            <ul id="expenseList" class="list-group"></ul>

            <div class="mt-3 text-end">
                <h5>Total: ₹<span id="total">0.00</span></h5>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
